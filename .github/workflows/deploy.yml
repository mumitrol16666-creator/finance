# =============================================================================
# GitHub Actions — Auto-deploy FinanceBot to server
# =============================================================================
# Triggers on push to `main` branch.
# Connects to your server via SSH and deploys the latest code.
#
# ── Required GitHub Secrets (Settings → Secrets and variables → Actions) ──
#
#   SERVER_HOST        — IP-адрес или домен сервера (например 123.45.67.89)
#   SERVER_USER        — SSH-пользователь (например root или deploy)
#   SERVER_SSH_KEY     — Приватный SSH-ключ (содержимое id_rsa / id_ed25519)
#   SERVER_PORT        — (опционально) SSH-порт, по умолчанию 22
#
# =============================================================================

name: Deploy FinanceBot

on:
  push:
    branches: [master]

jobs:
  deploy:
    name: 🚀 Deploy to Server
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Deploy via SSH ──────────────────────────────────────────────
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.PORT || 22 }}
          script: |
            set -e

            # Ensure github.com is in known_hosts to bypass host key verification
            mkdir -p ~/.ssh
            ssh-keyscan -H github.com >> ~/.ssh/known_hosts 2>/dev/null

            APP_DIR="/opt/finance-bot"
            REPO_URL="https://${{ github.token }}@github.com/${{ github.repository }}.git"
            BRANCH="master"

            echo "▸ Deploying $BRANCH to $APP_DIR …"

            # Clone or pull latest code
            if [ ! -d "$APP_DIR" ]; then
              git clone --branch "$BRANCH" "$REPO_URL" "$APP_DIR"
              cd "$APP_DIR"
            else
              cd "$APP_DIR"
              if [ ! -d ".git" ]; then
                git init
              fi
              git remote remove origin 2>/dev/null || true
              git remote add origin "$REPO_URL"
              git fetch origin "$BRANCH"
              git reset --hard "origin/$BRANCH"
              git clean -fd
            fi

            # Create virtual environment if missing
            if [ ! -d ".venv" ]; then
              python3 -m venv .venv
            fi

            # Install / update dependencies
            .venv/bin/pip install --upgrade pip
            .venv/bin/pip install -r requirements.txt

            # ── Migration & Systemd Service Update ──────────────────────────
            # 1. Copy environment file if missing in /opt/finance-bot
            if [ ! -f "$APP_DIR/.env" ] && [ -f "/root/Finance_bot/.env" ]; then
              echo "▸ Migrating .env from /root/Finance_bot to $APP_DIR …"
              cp /root/Finance_bot/.env "$APP_DIR/.env"
            fi

            # 2. Database is now exclusively in /opt/finance-bot/data/bot.db
            # We no longer sync from /root/Finance_bot to avoid overwriting!
            mkdir -p "$APP_DIR/data"

            # 3. Copy service files and reload systemd to switch to /opt/finance-bot
            echo "▸ Updating systemd service files …"
            sudo cp "$APP_DIR/finance-bot.service" /etc/systemd/system/finance-bot.service
            sudo cp "$APP_DIR/finance-api.service" /etc/systemd/system/finance-api.service
            sudo systemctl daemon-reload

            # Restart the bot and API (systemd services)
            echo "=== SYSTEMD SERVICE INFO ==="
            sudo systemctl cat finance-bot || true
            sudo systemctl cat finance-api || true
            
            echo "=== PYTHON PROCESSES BEFORE RESTART ==="
            ps aux | grep python || true

            sudo systemctl restart finance-bot
            sudo systemctl restart finance-api

            echo "=== SYSTEMD STATUS AFTER RESTART ==="
            sudo systemctl status finance-bot || true
            sudo systemctl status finance-api || true

            echo "=== PYTHON PROCESSES AFTER RESTART ==="
            ps aux | grep python || true

            echo "✓ Deploy complete"
